<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Edge Cards</title>
  <style>
    /* ── Palette & Fonts (Edge Compliance vibe) ── */
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap');

    :root {
      --bg:        #0f0f0f;
      --header-bg: #000000;
      --card-bg:   #ffffff;
      --ink:       #1a1a1a;
      --ink-light: #6b6b6b;
      --accent:    #2d2d2d;
      --border:    #e0dbd4;
      --shadow:    rgba(0,0,0,0.10);
      --swipe-yes: #4a7c59;
      --swipe-no:  #b94a4a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, hsl(69.15, 100%, 76.86%) 0%, #fde2ac 100%);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: none;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 20px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--header-bg);
      z-index: 10;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #faffe1;
    }

    .counter {
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--ink-light);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .progress-wrap {
      position: fixed;
      top: 64px; left: 0; right: 0;
      height: 2px;
      background: var(--border);
      z-index: 10;
    }
    .progress-bar {
      height: 100%;
      background: var(--ink);
      transition: width 0.35s ease;
    }

    /* ── Card stack ── */
    .stack {
      position: relative;
      width: min(360px, 90vw);
      height: min(520px, 72dvh);
      margin-top: 80px;
    }

    .card {
      position: absolute;
      inset: 0;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 4px 24px var(--shadow);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 32px;
      cursor: grab;
      user-select: none;
      will-change: transform;
      transform-origin: bottom center;
      /* fully opaque so cards behind never bleed through */
      opacity: 1;
      transition: transform 0.3s cubic-bezier(0.2,1,0.4,1), box-shadow 0.2s;
    }

    /* Top card */
    .card.top {
      cursor: grab;
    }
    .card.top:active { cursor: grabbing; }

    .card-image {
      width: 100%;
      height: 52%;
      background-size: cover;
      background-position: center;
      border-radius: 12px 12px 0 0;
      position: absolute;
      top: 0; left: 0; right: 0;
      flex-shrink: 0;
    }

    .card-body {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 48%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px 28px 44px;
      gap: 10px;
    }

    .card-number {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 28px;
      font-weight: 400;
    }

    .card-question {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 300;
      font-style: italic;
      color: var(--ink);
      text-align: center;
      line-height: 1.4;
    }

    .card-hint {
      position: absolute;
      bottom: 16px;
      font-size: 0.7rem;
      color: var(--border);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 400;
    }

    /* Swipe overlay labels */
    .stamp {
      position: absolute;
      top: 36px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      border: 2px solid;
      padding: 4px 14px;
      border-radius: 4px;
      opacity: 0;
      pointer-events: none;
      text-transform: uppercase;
      transition: opacity 0.05s;
    }
    .stamp-yes {
      left: 24px;
      color: var(--swipe-yes);
      border-color: var(--swipe-yes);
      transform: rotate(-12deg);
    }
    .stamp-no {
      right: 24px;
      color: var(--swipe-no);
      border-color: var(--swipe-no);
      transform: rotate(12deg);
    }

    /* ── Action buttons ── */
    .actions {
      display: flex;
      gap: 24px;
      margin-top: 28px;
    }

    .btn {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--card-bg);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1.4rem;
      box-shadow: 0 2px 12px var(--shadow);
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.92); box-shadow: none; }

    /* ── Intro screen ── */
    .intro-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 36px;
      gap: 20px;
      max-width: min(400px, 90vw);
    }
    .intro-screen.visible { display: flex; }

    .intro-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 8vw, 2.8rem);
      font-weight: 300;
      font-style: italic;
      color: var(--ink);
      line-height: 1.2;
    }

    .intro-desc {
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--ink-light);
      line-height: 1.7;
      letter-spacing: 0.02em;
    }

    .intro-desc em {
      font-style: normal;
      color: var(--ink);
      font-weight: 400;
    }

    /* ── End screen ── */
    .end-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 32px;
      gap: 16px;
    }
    .end-screen.visible { display: flex; }

    .end-score {
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-light);
      font-weight: 400;
      margin-bottom: 4px;
    }

    .end-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 8vw, 2.8rem);
      font-weight: 300;
      font-style: italic;
      color: var(--ink);
      line-height: 1.2;
    }

    .end-sub {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-light);
      font-weight: 300;
    }

    .restart-btn {
      margin-top: 16px;
      padding: 12px 32px;
      border: 1.5px solid var(--ink);
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--ink);
      border-radius: 2px;
      transition: background 0.2s, color 0.2s;
    }
    .restart-btn:hover { background: var(--ink); color: var(--bg); }
  </style>
</head>
<body>

  <header>
    <div class="logo">Edge</div>
    <div class="counter" id="counter">1 / 10</div>
  </header>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
  </div>

  <!-- Intro screen -->
  <div class="intro-screen visible" id="introScreen">
    <div class="intro-title">Welcome to the<br>compliance game.</div>
    <div class="intro-desc">You'll be shown a series of questions — swipe right for <em>Yes</em>, swipe left for <em>No</em>. At the end, you'll find out how well you know your compliance rules. Good luck.</div>
    <button class="restart-btn" id="startBtn">Start</button>
  </div>

  <!-- Card stack -->
  <div class="stack" id="stack" style="display:none"></div>

  <!-- Buttons -->
  <div class="actions" id="actions" style="display:none">
    <button class="btn" id="btnNo"  title="No">✕</button>
    <button class="btn" id="btnYes" title="Yes">✓</button>
  </div>

  <!-- End screen -->
  <div class="end-screen" id="endScreen">
    <div class="end-score" id="endScore"></div>
    <div class="end-title" id="endTitle"></div>
    <div class="end-sub" id="endSub"></div>
    <button class="restart-btn" id="restartBtn">Start over</button>
  </div>

  <script>
    // ── CONFIG ── edit cards and outcome messages here ─────────────────────

    // Each card: { title, correct, image }
    // correct: 'yes' = swipe right, 'no' = swipe left
    // image: URL to a freely available photo
    const CARDS = [
      {
        title:   "Is it Monday today?",
        correct: false,
        image:   "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800&q=80",
      },
      {
        title:   "Is it Tuesday today?",
        correct: false,
        image:   "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80",
      },
      {
        title:   "Is it Wednesday today?",
        correct: false,
        image:   "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=800&q=80",
      },
      {
        title:   "Is it Thursday today?",
        correct: false,
        image:   "https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=800&q=80",
      },
      {
        title:   "Is it Friday today?",
        correct: true,
        image:   "https://images.unsplash.com/photo-1486870591958-9b9d0d1dda99?w=800&q=80",
      },
      {
        title:   "Is it Saturday today?",
        correct: false,
        image:   "https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?w=800&q=80",
      },
      {
        title:   "Is it Sunday today?",
        correct: false,
        image:   "https://images.unsplash.com/photo-1491555103944-7c647fd857e6?w=800&q=80",
      },
      {
        title:   "Is it morning right now?",
        correct: false,
        image:   "https://images.unsplash.com/photo-1458442310124-dde6edb43d10?w=800&q=80",
      },
      {
        title:   "Is it afternoon right now?",
        correct: true,
        image:   "https://images.unsplash.com/photo-1439853949212-36589f288346?w=800&q=80",
      },
      {
        title:   "Is it evening right now?",
        correct: false,
        image:   "https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=800&q=80",
      },
    ];

    // Result buckets: { min (inclusive), max (exclusive), message }
    const BUCKETS = [
      {
        min: 0, max: 5,
        message: "You have done many mistakes.",
      },
      {
        min: 5, max: 8,
        message: "You have done not too many mistakes.",
      },
      {
        min: 8, max: Infinity,
        message: "You've done pretty much everything correctly. You are a champion.",
      },
    ];

    // ──────────────────────────────────────────────────────────────────────

    const stack       = document.getElementById('stack');
    const actions     = document.getElementById('actions');
    const endScreen   = document.getElementById('endScreen');
    const introScreen = document.getElementById('introScreen');
    const counter     = document.getElementById('counter');
    const progressBar = document.getElementById('progressBar');
    const btnNo       = document.getElementById('btnNo');
    const btnYes      = document.getElementById('btnYes');
    const restartBtn  = document.getElementById('restartBtn');
    const startBtn    = document.getElementById('startBtn');

    function showIntro() {
      introScreen.classList.add('visible');
      stack.style.display   = 'none';
      actions.style.display = 'none';
      endScreen.classList.remove('visible');
      counter.style.visibility = 'hidden';
      progressBar.parentElement.style.opacity = '0';
      progressBar.style.width = '0%';
    }

    function startGame() {
      introScreen.classList.remove('visible');
      stack.style.display   = '';
      actions.style.display = '';
      counter.style.visibility = 'visible';
      progressBar.parentElement.style.opacity = '1';
      buildStack();
    }

    startBtn.addEventListener('click', startGame);

    let current = 0;
    let cardEls = [];
    let isDragging = false;
    let responses = [];
    let rafId = null;

    // Static resting transforms for each depth slot (index into remaining stack)
    const REST = [
      { scale: 1,    ty: 0  },  // top card
      { scale: 0.96, ty: 10 },  // 2nd
      { scale: 0.92, ty: 20 },  // 3rd
      { scale: 0.88, ty: 30 },  // 4th+
    ];

    function restTransform(depth) {
      const r = REST[Math.min(depth, REST.length - 1)];
      return `scale(${r.scale}) translateY(${r.ty}px)`;
    }

    function buildStack() {
      stack.innerHTML = '';
      cardEls = [];
      responses = [];
      current = 0;
      updateUI();

      for (let i = CARDS.length - 1; i >= 0; i--) {
        const el = createCardEl(i);
        stack.appendChild(el);
        cardEls[i] = el;
      }

      // Assign z-index and resting transforms once — never touch again during drag
      cardEls.forEach((el, i) => {
        const depth = i - current;
        el.style.zIndex    = CARDS.length - depth;
        el.style.transform = restTransform(depth);
        el.style.transition = 'none';
        el.style.visibility = depth > 3 ? 'hidden' : 'visible';
      });

      attachDrag(cardEls[0]);
    }

    function repositionStack() {
      cardEls.slice(current).forEach((el, idx) => {
        el.style.zIndex     = CARDS.length - idx;
        el.style.visibility = idx > 3 ? 'hidden' : 'visible';
        if (idx === 0) {
          // New top card: no transition at all — it's already in resting position
          // (it was behind-1 a moment ago and just stepped forward via repositionStack)
          el.style.transition = 'none';
          void el.offsetWidth;
          el.style.transform  = restTransform(0);
        } else {
          el.style.transition = 'transform 0.35s cubic-bezier(0.2,1,0.4,1)';
          el.style.transform  = restTransform(idx);
        }
      });
    }

    function createCardEl(i) {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `
        ${CARDS[i].image ? `<div class="card-image" style="background-image: url('${CARDS[i].image}')"></div>` : ''}
        <div class="card-body">
          <div class="card-number">${String(i + 1).padStart(2, '0')} / ${String(CARDS.length).padStart(2, '0')}</div>
          <div class="card-question">${CARDS[i].title}</div>
        </div>
        <div class="stamp stamp-yes">Yes</div>
        <div class="stamp stamp-no">No</div>
        <div class="card-hint">← swipe →</div>
      `;
      return el;
    }

    function updateStack(dragRatio) {
      const remaining = cardEls.slice(current);
      remaining.forEach((el, idx) => {
        el.className = 'card';
        if (idx === 0) {
          el.classList.add('top');
        } else if (idx === 1) {
          // Animate second card toward top as drag increases
          if (dragRatio !== undefined) {
            const scale = 0.96 + dragRatio * 0.04;
            const ty    = 10  - dragRatio * 10;
            el.style.transform  = `scale(${scale}) translateY(${ty}px)`;
            el.style.transition = 'none';
          } else {
            el.style.transform  = '';
            el.style.transition = '';
            el.classList.add('behind-1');
          }
        } else if (idx === 2) {
          if (dragRatio !== undefined) {
            const scale = 0.92 + dragRatio * 0.04;
            const ty    = 20  - dragRatio * 10;
            el.style.transform  = `scale(${scale}) translateY(${ty}px)`;
            el.style.transition = 'none';
          } else {
            el.style.transform  = '';
            el.style.transition = '';
            el.classList.add('behind-2');
          }
        } else if (idx === 3) {
          el.style.transform  = '';
          el.style.transition = '';
          el.classList.add('behind-3');
        } else {
          el.style.transform  = '';
          el.style.transition = '';
          el.classList.add('hidden');
        }
      });
    }

    function updateUI() {
      const done = current;
      const total = CARDS.length;
      counter.textContent = `${Math.min(done + 1, total)} / ${total}`;
      progressBar.style.width = `${(done / total) * 100}%`;
    }

    function dismissCard(direction) {
      const el = cardEls[current];
      if (!el) return;

      const card    = CARDS[current];
      const answer  = direction === 'right'; // true = yes, false = no
      responses.push({ card, answer, correct: answer === card.correct });

      const flyX = direction === 'right' ? '140vw' : '-140vw';
      const rot  = direction === 'right' ? '28deg' : '-28deg';

      el.style.transition = 'transform 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.38s';
      el.style.transform  = `translateX(${flyX}) rotate(${rot})`;
      el.style.opacity    = '0';

      current++;
      updateUI();

      if (current >= CARDS.length) {
        setTimeout(showEnd, 380);
      } else {
        repositionStack();
        attachDrag(cardEls[current]);
      }
    }

    function showEnd() {
      const correctCount = responses.filter(r => r.correct).length;
      const total        = CARDS.length;
      const bucket       = BUCKETS.find(b => correctCount >= b.min && correctCount < b.max);

      document.getElementById('endScore').textContent = `${correctCount} / ${total} correct`;
      document.getElementById('endTitle').innerHTML   = bucket.message;
      document.getElementById('endSub').textContent   = 'All cards reviewed';

      stack.style.display   = 'none';
      actions.style.display = 'none';
      endScreen.classList.add('visible');
      progressBar.style.width = '100%';
      counter.textContent = `${total} / ${total}`;
    }

    restartBtn.addEventListener('click', showIntro);

    btnYes.addEventListener('click', () => { if (current < CARDS.length) dismissCard('right'); });
    btnNo.addEventListener('click',  () => { if (current < CARDS.length) dismissCard('left'); });

    // ── Drag / swipe ──────────────────────────────────────────────────────
    // Single module-level drag state — one set of handlers on document,
    // never re-attached per card, so no stale-closure accumulation.
    let dragStartX = 0, dragStartY = 0, dragDx = 0, dragDy = 0;
    let dragEl    = null;   // the card element currently being dragged
    let dragUnder1 = null, dragUnder2 = null;

    const getClientX = e => e.touches ? e.touches[0].clientX : e.clientX;
    const getClientY = e => e.touches ? e.touches[0].clientY : e.clientY;

    const dragFrame = () => {
      if (!dragEl) { rafId = null; return; }

      const rot = Math.max(-20, Math.min(20, dragDx * 0.12));
      dragEl.style.transform = `translateX(${dragDx}px) translateY(${dragDy * 0.25}px) rotate(${rot}deg)`;

      // Stamps
      const yesStamp = dragEl.querySelector('.stamp-yes');
      const noStamp  = dragEl.querySelector('.stamp-no');
      const ratio = Math.min(Math.abs(dragDx) / 80, 1);
      if (dragDx >= 0) {
        if (yesStamp) yesStamp.style.opacity = ratio;
        if (noStamp)  noStamp.style.opacity  = '0';
      } else {
        if (noStamp)  noStamp.style.opacity  = ratio;
        if (yesStamp) yesStamp.style.opacity = '0';
      }

      // Nudge under-cards toward their promoted position
      const t = Math.min(Math.abs(dragDx) / 120, 1);
      if (dragUnder1) {
        const scale = 0.96 + t * 0.04;
        const ty    = 10  - t * 10;
        dragUnder1.style.transform = `scale(${scale}) translateY(${ty}px)`;
      }
      if (dragUnder2) {
        const scale = 0.92 + t * 0.04;
        const ty    = 20  - t * 10;
        dragUnder2.style.transform = `scale(${scale}) translateY(${ty}px)`;
      }

      rafId = null;
    };

    const onDragStart = e => {
      // Only respond if the target (or an ancestor) is the current top card
      const topCard = cardEls[current];
      if (!topCard || !topCard.contains(e.target)) return;

      isDragging  = true;
      dragEl      = topCard;
      dragStartX  = getClientX(e);
      dragStartY  = getClientY(e);
      dragDx = 0; dragDy = 0;

      // Kill any in-flight CSS transitions before we start writing transforms
      dragEl.style.transition = 'none';
      void dragEl.offsetWidth; // flush so transition:none takes effect immediately

      dragUnder1 = cardEls[current + 1] || null;
      dragUnder2 = cardEls[current + 2] || null;
      if (dragUnder1) { dragUnder1.style.transition = 'none'; void dragUnder1.offsetWidth; }
      if (dragUnder2) { dragUnder2.style.transition = 'none'; void dragUnder2.offsetWidth; }
    };

    const onDragMove = e => {
      if (!isDragging || !dragEl) return;
      dragDx = getClientX(e) - dragStartX;
      dragDy = getClientY(e) - dragStartY;
      if (!rafId) rafId = requestAnimationFrame(dragFrame);
    };

    const onDragEnd = () => {
      if (!isDragging || !dragEl) return;
      isDragging = false;
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }

      const yesStamp = dragEl.querySelector('.stamp-yes');
      const noStamp  = dragEl.querySelector('.stamp-no');
      if (yesStamp) yesStamp.style.opacity = '0';
      if (noStamp)  noStamp.style.opacity  = '0';

      if (Math.abs(dragDx) > 90) {
        dismissCard(dragDx > 0 ? 'right' : 'left');
      } else {
        // Spring back to resting position
        dragEl.style.transition = 'transform 0.4s cubic-bezier(0.2,1,0.4,1)';
        dragEl.style.transform  = restTransform(0);
        if (dragUnder1) {
          dragUnder1.style.transition = 'transform 0.4s cubic-bezier(0.2,1,0.4,1)';
          dragUnder1.style.transform  = restTransform(1);
        }
        if (dragUnder2) {
          dragUnder2.style.transition = 'transform 0.4s cubic-bezier(0.2,1,0.4,1)';
          dragUnder2.style.transform  = restTransform(2);
        }
      }

      dragEl     = null;
      dragUnder1 = null;
      dragUnder2 = null;
      dragDx = 0; dragDy = 0;
    };

    // Attach once to document — covers the full viewport for both mouse and touch
    document.addEventListener('mousedown',  onDragStart);
    document.addEventListener('touchstart', onDragStart, { passive: true });
    document.addEventListener('mousemove',  onDragMove);
    document.addEventListener('touchmove',  onDragMove, { passive: true });
    document.addEventListener('mouseup',    onDragEnd);
    document.addEventListener('touchend',   onDragEnd);

    // attachDrag is now a no-op kept for call-site compatibility
    function attachDrag(el) { /* drag is handled by module-level listeners */ }

    // ── Keyboard support ─────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (current >= CARDS.length) return;
      if (e.key === 'ArrowRight') dismissCard('right');
      if (e.key === 'ArrowLeft')  dismissCard('left');
    });

    // ── Init ──────────────────────────────────────────────────────────────
    showIntro();
  </script>
</body>
</html>
